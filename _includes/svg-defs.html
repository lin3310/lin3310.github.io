<!-- SVG 圖標定義庫：車站圓形標示風格，純 stroke -->
<!-- 放在 <body> 最前面（default.html 引入）-->
<svg aria-hidden="true" focusable="false" style="display:none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- 筆記 / 技術 -->
    <symbol id="ic-note" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r="12.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <path d="M9 19 L10.5 14.5 L17.5 7.5 C18.3 6.7 19.5 6.7 20.3 7.5 C21.1 8.3 21.1 9.5 20.3 10.3 L13.3 17.3 Z"
            fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      <line x1="9" y1="19" x2="13.3" y2="17.3" stroke="currentColor" stroke-width="1.2"/>
      <line x1="15.8" y1="9" x2="19" y2="12.2" stroke="currentColor" stroke-width="1.2"/>
    </symbol>

    <!-- 語言 / 翻譯 -->
    <symbol id="ic-lang" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r="12.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <path d="M8 10 L16 10 M8 14 L14 14"
            stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M12 10 C12 10 10 13 12 15 C14 17 12 10 12 10"
            fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
      <path d="M17 13 L20 20 M22 13 L19 20"
            stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
      <line x1="18" y1="17.5" x2="21" y2="17.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
    </symbol>

    <!-- 閱讀 -->
    <symbol id="ic-read" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r="12.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <path d="M8 9.5 L8 19.5 L14 17 L20 19.5 L20 9.5 L14 12 Z"
            fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      <line x1="14" y1="12" x2="14" y2="17" stroke="currentColor" stroke-width="1.2"/>
    </symbol>

    <!-- 旅記 / 移動 -->
    <symbol id="ic-travel" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r="12.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <rect x="7" y="11.5" width="14" height="7.5" rx="1.5"
            fill="none" stroke="currentColor" stroke-width="1.2"/>
      <circle cx="10.5" cy="19" r="1.4" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <circle cx="17.5" cy="19" r="1.4" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <path d="M10.5 11.5 L10.5 9.5 L17.5 9.5 L17.5 11.5"
            fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      <line x1="7" y1="15" x2="21" y2="15" stroke="currentColor" stroke-width="1.1"/>
    </symbol>

    <!-- 生活 / 雜記 -->
    <symbol id="ic-life" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r="12.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <circle cx="14" cy="14" r="3.8" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <line x1="14" y1="7.2" x2="14" y2="9.8"  stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="14" y1="18.2" x2="14" y2="20.8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="7.2" y1="14" x2="9.8" y2="14"  stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="18.2" y1="14" x2="20.8" y2="14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </symbol>

    <!-- ACG / 音樂（六分音符）-->
    <symbol id="ic-music" viewBox="0 0 28 28">
      <circle cx="14" cy="14" r="12.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
      <line x1="11" y1="9" x2="11" y2="19" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="11" y1="9" x2="19" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="19" y1="7" x2="19" y2="17" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="11" cy="19" r="2" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <circle cx="19" cy="17" r="2" fill="none" stroke="currentColor" stroke-width="1.2"/>
    </symbol>

  </defs>
</svg>
