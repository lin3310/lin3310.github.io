<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  <title>{% if page.title %}{{ page.title }} — {{ site.name }}{% else %}{{ site.name }}{% endif %}</title>

  <!-- 字型 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500;700;900&family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

  <!-- 樣式 -->
  <link rel="stylesheet" href="{{ site.baseurl }}/style.css">

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml">

  <!-- Open Graph -->
  <meta property="og:title"       content="{% if page.title %}{{ page.title }}{% else %}{{ site.name }}{% endif %}">
  <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type"        content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url"         content="{{ page.url | absolute_url }}">
</head>
<body>

  {% include svg-defs.html %}
  {% include header.html %}

  <main id="main-content" tabindex="-1">
    {{ content }}
  </main>

  {% include footer.html %}
  {% include theme-controls.html %}

</body>
</html>
